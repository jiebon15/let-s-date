// FUNGSI TUKAR POSISI YANG STABIL
function tukarPosisi(el1, el2) {
  // Efek menghilang halus
  el1.style.opacity = "0";
  el2.style.opacity = "0";

  setTimeout(() => {
    // Teknik Tukar Posisi "Simetris"
    const p1 = el1.parentNode;
    const p2 = el2.parentNode;
    const placeholder = document.createElement('div');
    
    // Masukkan placeholder sementara di posisi el1
    p1.insertBefore(placeholder, el1);
    
    // Pindahkan el1 ke posisi el2, dan el2 ke posisi placeholder tadi
    p2.insertBefore(el1, el2);
    p1.insertBefore(el2, placeholder);
    
    // Hapus placeholder
    p1.removeChild(placeholder);

    // Munculkan kembali
    el1.style.opacity = "1";
    el2.style.opacity = "1";
  }, 250);
}
