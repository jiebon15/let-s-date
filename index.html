<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise buat Kamu ❤️</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #ffe4e1;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px;
        }

        .header-text {
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-align: center;
            z-index: 10;
            margin-bottom: 20px;
        }

        h1 {
            color: #d81b60;
            margin: 0;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        p {
            color: #ad1457;
            margin: 10px 0;
            font-size: 1.1rem;
        }

        .places-grid {
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: center;
            transition: gap 0.5s ease;
            width: 100%;
            padding-top: 40px;
        }

        .place-item {
            border: 6px solid white;
            border-radius: 25px;
            background-color: white;
            padding: 15px;
            cursor: pointer;
            width: 180px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        left 0.4s ease, top 0.4s ease, opacity 0.3s ease, 
                        box-shadow 0.5s ease, border-color 0.5s ease;
        }

        .place-item img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 15px;
            pointer-events: none;
        }

        .place-item p {
            font-weight: 600;
            color: #d81b60;
            margin: 15px 0 5px 0;
            font-size: 1rem;
        }

        #place2 { z-index: 100; border-color: #ffffff; }

        .glow-active {
            box-shadow: 0 0 60px rgba(255, 64, 129, 0.8) !important;
            border-color: #ff4081 !important;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(216, 27, 96, 0.3);
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background-color: white;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 40px;
            border-radius: 35px;
            width: 85%; max-width: 350px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: translate(-50%, -50%) scale(0.6); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .modal-content button {
            background-color: #ff4081;
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 18px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header-text" id="headerText">
            <h1>Aquarium Date YUUUKKK!!! ❤️</h1>
            <p>(Pilih satu ya...)</p>
        </div>
        
        <div class="places-grid" id="gridContainer">
            <div class="place-item" onclick="pilihTempat(1, this)" id="place1">
                <img src="https://lh3.googleusercontent.com/d/1ACBpbjD95K_598XP27CMuHTnRqjlPwZR" alt="Tempat 1">
                <p>Jakarta Aquarium</p>
            </div>

            <div class="place-item" onclick="pilihTempat(2, this)" id="place2">
                <img src="https://lh3.googleusercontent.com/d/1rPlcNcTKoIzpLZYaXxMajP8uOEGMXqag" alt="Tempat 2">
                <p>Jatinegara Fish Market</p>
            </div>

            <div class="place-item" onclick="pilihTempat(3, this)" id="place3">
                <img src="https://lh3.googleusercontent.com/d/1kP7KnQ1Yo2Z1kb893VtEUXAKWohMVVh0" alt="Tempat 3">
                <p>Seaworl Ancol</p>
            </div>
        </div>
    </div>

    <div id="customModal" class="modal">
        <div class="modal-content">
            <h2>Ciee aku tau banget kamu bakal pilih itu!❤️</h2>
            <p>Aku juga pengen banget ke jatinegara sama kamu!</p>
            <button onclick="lanjutHalaman()">Mau Banget!</button>
        </div>
    </div>

    <script>
        let skalaOpsi2 = 1.0;
        let posisiYHeader = 0;
        let gridGap = 30;
        let opsiTerakhir = null;
        let jumlahKlikSama = 0;

        function pilihTempat(no, element) {
            const place2 = document.getElementById('place2');
            const header = document.getElementById('headerText');
            const grid = document.getElementById('gridContainer');

            if (no === 1 || no === 3) {
                if (no === opsiTerakhir) {
                    jumlahKlikSama++;
                } else {
                    opsiTerakhir = no;
                    jumlahKlikSama = 1;
                }

                if (jumlahKlikSama >= 2) {
                    tukarPosisi(element, place2);
                    jumlahKlikSama = 0;
                    opsiTerakhir = null; 
                    return;
                }

                let currentScale = parseFloat(element.getAttribute('data-scale')) || 1.0;
                
                if (currentScale > 0.5) {
                    let newScale = currentScale - 0.15;
                    element.style.transform = `scale(${newScale})`;
                    element.setAttribute('data-scale', newScale);
                    
                    if (skalaOpsi2 < 1.8) {
                        skalaOpsi2 += 0.2;
                        //gridGap += 40;
                        posisiYHeader -= 30;
                        if (skalaOpsi2 >= 1.8) place2.classList.add('glow-active');
                    }
                    
                    place2.style.transform = `scale(${skalaOpsi2})`;
                    //grid.style.gap = `${gridGap}px`;
                    header.style.transform = `translateY(${posisiYHeader}px)`;
                } else {
                    const x = Math.random() * (window.innerWidth - 200);
                    const y = Math.random() * (window.innerHeight - 200);
                    element.style.position = 'fixed';
                    element.style.left = `${x}px`;
                    element.style.top = `${y}px`;
                }
            } else if (no === 2) {
                document.getElementById('customModal').style.display = "block";
            }
        }

        function tukarPosisi(el1, el2) {
            el1.style.opacity = "0";
            el2.style.opacity = "0";
            setTimeout(() => {
                const p1 = el1.parentNode;
                const placeholder = document.createElement('div');
                p1.insertBefore(placeholder, el1);
                el1.parentNode.insertBefore(el1, el2);
                p1.insertBefore(el2, placeholder);
                p1.removeChild(placeholder);
                el1.style.opacity = "1";
                el2.style.opacity = "1";
            }, 250);
        }

        function lanjutHalaman() {
            const pesan = "Iyaaa aku mau banget nge-date di jatinegara! ❤️";
            const linkWA = "https://wa.me/6288216486035?text=" + encodeURIComponent(pesan);
            window.open(linkWA, '_blank');
            document.getElementById('customModal').style.display = "none";
            const container = document.querySelector('.main-container');
            container.innerHTML = `
                <div class="header-text" style="transform: translateY(0)">
                    <h1 style="font-size: 3rem">Yeeay! 🥳</h1>
                    <p style="font-size: 1.5rem">Sampai ketemu besok ya! <br> I Love You! ❤️</p>
                </div>
            `;
        }
    </script>
</body>
</html>
